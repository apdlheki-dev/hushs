<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>منصة الدراسة الذكية</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">


<style>

:root {
    --bg-primary:#0f172a;
    --bg-secondary:#1e293b;
    --card:rgba(30,41,59,.75);
    --accent:#6366f1;
    --accent-hover:#4f46e5;
    --text:#f8fafc;
    --muted:#94a3b8;
    --border:rgba(255,255,255,.1);
}


* {
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:'Tajawal',sans-serif;
}


body {

    background:
    radial-gradient(circle at 10% 20%,rgba(99,102,241,.18),transparent 40%),
    radial-gradient(circle at 90% 80%,rgba(168,85,247,.18),transparent 40%),
    var(--bg-primary);

    color:var(--text);
    min-height:100vh;
    direction:rtl;
    text-align:right;

}


header {

    text-align:center;
    padding:35px 15px;

}


header h1 {

    font-size:2.4rem;
    font-weight:900;

    background:linear-gradient(135deg,#818cf8,#c084fc);

    -webkit-background-clip:text;
    color:transparent;

}


.developer {

    color:var(--muted);
    margin:10px;

}


header p {

    color:var(--muted);
    font-size:1.1rem;

}



.container {

    width:92%;
    max-width:1400px;
    margin:auto;

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:25px;

}


@media(max-width:900px){

.container{

grid-template-columns:1fr;

}

}



.card {

background:var(--card);

backdrop-filter:blur(15px);

border:1px solid var(--border);

border-radius:20px;

padding:25px;

box-shadow:0 10px 30px rgba(0,0,0,.3);

}



.title {

font-size:1.3rem;

font-weight:700;

padding-bottom:15px;

border-bottom:1px solid var(--border);

margin-bottom:20px;

display:flex;

align-items:center;

gap:10px;

}



.title i {

color:var(--accent);

}



button {

border:none;

cursor:pointer;

font-family:inherit;

}



.btn {

background:var(--accent);

color:white;

padding:12px 25px;

border-radius:12px;

font-weight:700;

transition:.3s;

}


.btn:hover {

background:var(--accent-hover);

transform:translateY(-2px);

}



.btn-secondary {

background:rgba(255,255,255,.08);

border:1px solid var(--border);

}



input,select {

width:100%;

background:rgba(0,0,0,.2);

border:1px solid var(--border);

color:white;

padding:12px;

border-radius:10px;

outline:none;

}


input:focus,select:focus{

border-color:var(--accent);

}


</style>

</head>
<body>

<header>

<h1>
    منصة الدراسة والتركيز
</h1>

<div class="developer">
    تم إعداد الواجهة بواسطة عبدالله علي
</div>

<p>
    نظم وقتك، ركز في مهامك، واستمتع بأجواء هادئة تساعدك على الإنتاجية
</p>

</header>


<div class="container">


<!-- قسم العداد -->

<div class="card">

<div class="title">
<i class="fa-solid fa-clock"></i>
عداد البومودورو للتركيز
</div>


<div class="modes">

<button class="btn mode active" onclick="timer.setMode(25,this)">
دراسة (25 د)
</button>


<button class="btn btn-secondary mode" onclick="timer.setMode(5,this)">
استراحة قصيرة (5 د)
</button>


<button class="btn btn-secondary mode" onclick="timer.setMode(15,this)">
استراحة طويلة (15 د)
</button>


</div>


<h2 id="timerDisplay" style="
text-align:center;
font-size:4rem;
margin:30px 0;
">
25:00
</h2>



<div style="
display:flex;
justify-content:center;
gap:15px;
">


<button class="btn" onclick="timer.toggle()">

<i class="fa-solid fa-play" id="playIcon"></i>

<span id="playText">
بدء
</span>

</button>



<button class="btn btn-secondary" onclick="timer.reset()">

<i class="fa-solid fa-rotate-left"></i>

إعادة ضبط

</button>


</div>


</div>





<!-- قسم اليوتيوب -->


<div class="card">


<div class="title">

<i class="fa-brands fa-youtube" style="color:#ef4444"></i>

مشغل اليوتيوب

</div>



<div style="
display:flex;
gap:10px;
">


<input id="youtubeURL"
placeholder="ضع رابط فيديو يوتيوب">


<button class="btn" onclick="youtube.load()">

تشغيل

</button>


</div>



<div id="player" style="
margin-top:20px;
aspect-ratio:16/9;
background:black;
border-radius:15px;
overflow:hidden;
">


</div>


</div>





<!-- جدول المهام -->


<div class="card" style="grid-column:1/-1;">


<div class="title">

<i class="fa-solid fa-calendar-days"></i>

جدول المهام اليومية

</div>



<div style="
display:grid;
grid-template-columns:2fr 1fr 1fr auto;
gap:10px;
">


<input id="taskName"
placeholder="اسم المهمة أو المادة">



<input id="taskTime"
placeholder="الوقت">


<select id="taskType">

<option>
دراسة
</option>

<option>
مراجعة
</option>

<option>
استراحة
</option>

<option>
أخرى
</option>

</select>



<button class="btn" onclick="tasks.add()">

<i class="fa-solid fa-plus"></i>

إضافة

</button>


</div>



<table style="
width:100%;
margin-top:25px;
border-collapse:collapse;
">


<thead>

<tr>

<th>
المهمة
</th>

<th>
الوقت
</th>

<th>
التصنيف
</th>

<th>
حذف
</th>

</tr>


</thead>



<tbody id="taskList">


</tbody>


</table>
    <script>


// ======================
// عداد البومودورو
// ======================


const timer = {

seconds:1500,

defaultSeconds:1500,

running:false,

interval:null,


display:document.getElementById("timerDisplay"),

icon:document.getElementById("playIcon"),

text:document.getElementById("playText"),



show:function(){

let min=Math.floor(this.seconds/60);

let sec=this.seconds%60;


this.display.textContent =
String(min).padStart(2,"0")
+
":"
+
String(sec).padStart(2,"0");

},



toggle:function(){


if(this.running){


clearInterval(this.interval);

this.running=false;

this.icon.className="fa-solid fa-play";

this.text.textContent="بدء";


}

else{


this.running=true;


this.icon.className="fa-solid fa-pause";

this.text.textContent="إيقاف";



this.interval=setInterval(()=>{


if(this.seconds>0){


this.seconds--;

this.show();


}

else{


clearInterval(this.interval);

this.running=false;


alert("انتهى الوقت!");


this.icon.className="fa-solid fa-play";

this.text.textContent="بدء";


}



},1000);



}


},



reset:function(){


clearInterval(this.interval);


this.running=false;


this.seconds=this.defaultSeconds;


this.show();


this.icon.className="fa-solid fa-play";

this.text.textContent="بدء";


},




setMode:function(minutes,button){


clearInterval(this.interval);


this.running=false;


this.seconds=minutes*60;


this.defaultSeconds=this.seconds;


this.show();



document.querySelectorAll(".mode")
.forEach(btn=>{

btn.classList.remove("active");

btn.classList.add("btn-secondary");

});


button.classList.add("active");

button.classList.remove("btn-secondary");



this.icon.className="fa-solid fa-play";

this.text.textContent="بدء";


}



};



timer.show();

    </script>

</div>


</div>
    <script>


// ======================
// جدول المهام والحفظ
// ======================


const tasks = {


items: JSON.parse(localStorage.getItem("studyTasks")) || [],



save:function(){

localStorage.setItem(
"studyTasks",
JSON.stringify(this.items)
);

},




show:function(){


let list=document.getElementById("taskList");


list.innerHTML="";



this.items.forEach((task,index)=>{


list.innerHTML += `

<tr style="border-bottom:1px solid rgba(255,255,255,.1)">

<td style="padding:12px">
${task.name}
</td>


<td style="padding:12px">
${task.time}
</td>


<td style="padding:12px">
<span style="
background:rgba(99,102,241,.2);
color:#818cf8;
padding:5px 12px;
border-radius:20px;
">
${task.type}
</span>
</td>


<td style="padding:12px">

<button
onclick="tasks.remove(${index})"
style="
background:#ef4444;
color:white;
padding:7px 15px;
border-radius:8px;
">

حذف

</button>

</td>


</tr>


`;



});


},




add:function(){


let name=document.getElementById("taskName").value.trim();

let time=document.getElementById("taskTime").value.trim();

let type=document.getElementById("taskType").value;



if(name==="" || time===""){


alert("اكتب اسم المهمة والوقت");

return;


}



this.items.push({

name:name,

time:time,

type:type

});



this.save();

this.show();



document.getElementById("taskName").value="";

document.getElementById("taskTime").value="";


},




remove:function(index){


this.items.splice(index,1);


this.save();


this.show();



}





tasks.show();



    </script>
    
<script>


// ======================
// مشغل اليوتيوب
// ======================


const youtube = {


load:function(){


let url=document.getElementById("youtubeURL").value.trim();


if(url===""){

alert("ضع رابط يوتيوب أولاً");

return;

}



let videoId="";



// رابط عادي
if(url.includes("watch?v=")){


videoId=url.split("watch?v=")[1].split("&")[0];


}


// رابط مختصر
else if(url.includes("youtu.be/")){


videoId=url.split("youtu.be/")[1].split("?")[0];


}


else{


alert("الرابط غير صحيح");

return;


}



document.getElementById("player").innerHTML=`

<iframe

width="100%"

height="100%"

src="https://www.youtube.com/embed/${videoId}"

frameborder="0"

allowfullscreen>

</iframe>

`;



}



};



</script>



<footer style="
text-align:center;
padding:25px;
margin-top:40px;
color:#94a3b8;
border-top:1px solid rgba(255,255,255,.1);
">

جميع الحقوق محفوظة © 2026 | تم تطويره بواسطة عبدالله علي

</footer>


</body>

</html>
